<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#030504" />
    <title>Nevian: AI-powered IT support for lean teams</title>
    <meta name="description" content="Nevian pairs a light Windows desk agent with an AI ticket assistant and secure automation so small and mid-sized IT teams resolve tickets in minutes." />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/assets/logo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <style>
      html,body,#root{margin:0;min-height:100%;background:#030504;color-scheme:dark}
      @view-transition{navigation:auto}
      ::view-transition-old(root){animation:nevian-page-out 90ms ease-out both}
      ::view-transition-new(root){animation:nevian-page-in 170ms cubic-bezier(.2,.75,.25,1) both}
      @keyframes nevian-page-out{to{opacity:.86}}
      @keyframes nevian-page-in{from{opacity:.82;transform:translateY(3px)}to{opacity:1;transform:none}}
      @media(prefers-reduced-motion:reduce){::view-transition-old(root),::view-transition-new(root){animation:none}}
    </style>
    <script type="speculationrules">
      {"prerender":[{"urls":["/process.html","/contact.html"],"eagerness":"moderate"}]}
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

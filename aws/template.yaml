AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Nevian contact form. HTTP API Gateway -> Lambda -> SES. Sends every
  form submission from nevian.info to the configured mailbox.

Parameters:
  RecipientEmail:
    Type: String
    Default: nevian.info@gmail.com
    Description: Mailbox that receives contact form submissions.

  SenderEmail:
    Type: String
    Default: noreply@nevian.info
    Description: >
      SES "From" address. Must be at a verified SES identity (this project
      verifies the whole nevian.info domain, so any nevian.info address works).

  SenderName:
    Type: String
    Default: Nevian Contact Form
    Description: Human-readable "From" name shown in the recipient's inbox.

  AllowedOrigins:
    Type: CommaDelimitedList
    Default: 'https://nevian.info,https://www.nevian.info,http://localhost:8080,http://127.0.0.1:8080'
    Description: >
      Comma-separated origins allowed by CORS. Include your apex, www,
      and any local dev origins you use for testing.

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures: [arm64]
    MemorySize: 128
    Timeout: 10

Resources:
  ContactFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/
      Handler: index.handler
      Description: Receives contact form submissions and sends them via SES.
      Environment:
        Variables:
          RECIPIENT_EMAIL: !Ref RecipientEmail
          SENDER_EMAIL: !Ref SenderEmail
          SENDER_NAME: !Ref SenderName
          # Lambda receives the first origin as the primary CORS origin.
          # For requests, API Gateway itself enforces the full list.
          ALLOWED_ORIGIN: !Select [0, !Ref AllowedOrigins]
      Policies:
        - Statement:
            - Effect: Allow
              Action: ses:SendEmail
              Resource: '*'
      Events:
        Contact:
          Type: HttpApi
          Properties:
            ApiId: !Ref ContactApi
            Path: /contact
            Method: POST

  ContactApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins: !Ref AllowedOrigins
        AllowMethods:
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
        MaxAge: 3600

Outputs:
  ContactEndpoint:
    Description: POST this URL from the website contact form.
    Value: !Sub 'https://${ContactApi}.execute-api.${AWS::Region}.amazonaws.com/contact'

  FunctionName:
    Description: Lambda function name (useful for `sam logs -n <name>`).
    Value: !Ref ContactFunction

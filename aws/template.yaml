AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Nevian contact form. HTTP API Gateway -> Lambda -> SES. Sends every
  form submission from nevian.info to the configured mailbox.

Parameters:
  RecipientEmail:
    Type: String
    Default: nevian.info@gmail.com
    Description: Mailbox that receives contact form submissions.

  SenderEmail:
    Type: String
    Default: nevian.info@gmail.com
    Description: >
      SES "From" address. This identity must be verified in SES. In sandbox
      mode, the recipient must be verified as well.

  AllowedOrigin:
    Type: String
    Default: https://nevian.info
    Description: Origin allowed by CORS (your production site URL).

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures: [arm64]
    MemorySize: 128
    Timeout: 10

Resources:
  ContactFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/
      Handler: index.handler
      Description: Receives contact form submissions and sends them via SES.
      Environment:
        Variables:
          RECIPIENT_EMAIL: !Ref RecipientEmail
          SENDER_EMAIL: !Ref SenderEmail
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      Policies:
        - Statement:
            - Effect: Allow
              Action: ses:SendEmail
              Resource: '*'
      Events:
        Contact:
          Type: HttpApi
          Properties:
            ApiId: !Ref ContactApi
            Path: /contact
            Method: POST

  ContactApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - !Ref AllowedOrigin
        AllowMethods:
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
        MaxAge: 3600
      # Cheap access logging is off by default. Enable in the console if you
      # need to debug live submissions.

Outputs:
  ContactEndpoint:
    Description: POST this URL from the website contact form.
    Value: !Sub 'https://${ContactApi}.execute-api.${AWS::Region}.amazonaws.com/contact'

  FunctionName:
    Description: Lambda function name (useful for `sam logs -n <name>`).
    Value: !Ref ContactFunction
